<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="忍者手记 - Discord 登录" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>忍者手记 - 登录</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E印%3C/text%3E%3C/svg%3E" />
  <style>
    /* ========== Reset & Base ========== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    @font-face {
      font-family: 'Ninja Fallback';
      src: local('Noto Serif SC'), local('Source Han Serif SC'), local('SimSun');
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', serif;
    }

    body {
      background: #0a0a0f;
      color: #e8e6e3;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ========== Background Layers ========== */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg-image {
      background: url('/img/login-bg.png') center top/cover no-repeat fixed;
    }

    .bg-gradient {
      background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.35) 100%);
    }

    /* ========== Vignette ========== */
    .bg-vignette {
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
    }

    /* ========== Floating Particles (CSS only) ========== */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: particleFloat linear infinite;
      opacity: 0;
    }

    /* Fire particles */
    .particle--fire {
      background: radial-gradient(circle, rgba(255,107,53,0.8), rgba(247,147,30,0.3) 60%, transparent 70%);
      box-shadow: 0 0 6px rgba(255,107,53,0.4);
    }

    /* Chakra particles */
    .particle--chakra {
      background: radial-gradient(circle, rgba(79,195,247,0.7), rgba(2,136,209,0.3) 60%, transparent 70%);
      box-shadow: 0 0 8px rgba(79,195,247,0.3);
    }

    /* Ember / tiny spark */
    .particle--ember {
      background: radial-gradient(circle, rgba(255,200,50,0.9), rgba(255,107,53,0.2) 70%, transparent);
      box-shadow: 0 0 3px rgba(255,160,50,0.5);
    }

    @keyframes particleFloat {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-100vh) translateX(var(--drift)) scale(0.3); opacity: 0; }
    }

    /* ========== Seal / Kanji glow behind card ========== */
    .seal-glow {
      position: fixed;
      z-index: 1;
      width: 420px; height: 420px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,53,0.06) 0%, transparent 70%);
      animation: sealPulse 4s ease-in-out infinite;
    }

    @keyframes sealPulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50%      { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
    }

    /* ========== Login Card ========== */
    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      padding: 48px 36px 36px;
      background: rgba(16,16,32,0.82);
      backdrop-filter: blur(24px) saturate(1.3);
      -webkit-backdrop-filter: blur(24px) saturate(1.3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      box-shadow:
        0 0 80px rgba(255,107,53,0.06),
        0 0 40px rgba(79,195,247,0.04),
        0 8px 32px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.04);
      text-align: center;

      /* Entrance animation */
      animation: cardEnter 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardEnter {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.96);
        filter: blur(8px);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    /* Subtle animated border glow */
    .login-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 21px;
      padding: 1px;
      background: linear-gradient(
        135deg,
        rgba(255,107,53,0.2) 0%,
        transparent 30%,
        rgba(79,195,247,0.15) 70%,
        transparent 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      animation: borderShimmer 6s ease-in-out infinite;
    }

    @keyframes borderShimmer {
      0%, 100% { opacity: 0.5; }
      50%      { opacity: 1; }
    }

    /* ========== Logo ========== */
    .login-logo {
      width: 96px;
      height: 96px;
      margin: 0 auto 24px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,107,53,0.3);
      box-shadow: 0 0 30px rgba(255,107,53,0.15), 0 0 60px rgba(255,107,53,0.05);
      animation: logoGlow 3s ease-in-out infinite alternate;
    }

    @keyframes logoGlow {
      0%   { box-shadow: 0 0 20px rgba(255,107,53,0.15), 0 0 40px rgba(255,107,53,0.05); }
      100% { box-shadow: 0 0 30px rgba(79,195,247,0.2), 0 0 60px rgba(79,195,247,0.08); }
    }

    /* ========== Title ========== */
    .login-title {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 8px;
      color: #e8e6e3;
      margin-bottom: 4px;
      text-shadow: 0 0 20px rgba(255,107,53,0.2);
    }

    .login-subtitle {
      font-size: 14px;
      letter-spacing: 6px;
      color: rgba(232,230,227,0.4);
      margin-bottom: 36px;
      font-weight: 400;
    }

    /* ========== Divider ========== */
    .divider {
      width: 60px;
      height: 1px;
      margin: 0 auto 32px;
      background: linear-gradient(90deg, transparent, rgba(255,107,53,0.4), rgba(79,195,247,0.3), transparent);
    }

    /* ========== Discord Button ========== */
    .discord-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px 24px;
      background: #5865F2;
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
      overflow: hidden;
      box-shadow:
        0 4px 16px rgba(88,101,242,0.3),
        0 2px 4px rgba(0,0,0,0.2);
    }

    .discord-btn:hover {
      background: #4752c4;
      transform: translateY(-2px);
      box-shadow:
        0 8px 28px rgba(88,101,242,0.4),
        0 4px 8px rgba(0,0,0,0.3);
    }

    .discord-btn:active {
      transform: translateY(0);
      box-shadow:
        0 2px 8px rgba(88,101,242,0.3),
        0 1px 2px rgba(0,0,0,0.2);
    }

    /* Shine sweep on hover */
    .discord-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s ease;
    }

    .discord-btn:hover::after {
      left: 100%;
    }

    .discord-btn svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    /* ========== Hint Text ========== */
    .login-hint {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(232,230,227,0.35);
      line-height: 1.6;
      letter-spacing: 0.5px;
    }

    /* ========== Error Message ========== */
    .error-msg {
      margin-top: 20px;
      padding: 14px 18px;
      background: rgba(220,38,38,0.12);
      border: 1px solid rgba(220,38,38,0.25);
      border-radius: 10px;
      color: #fca5a5;
      font-size: 13px;
      line-height: 1.5;
      display: none;
      animation: errorEnter 0.4s ease-out both;
    }

    .error-msg.visible {
      display: block;
    }

    @keyframes errorEnter {
      0%   { opacity: 0; transform: translateY(-8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .error-icon {
      display: inline-block;
      margin-right: 6px;
      font-style: normal;
    }

    /* ========== Footer ========== */
    .login-footer {
      position: fixed;
      bottom: 20px;
      left: 0; right: 0;
      text-align: center;
      z-index: 10;
      font-size: 11px;
      color: rgba(232,230,227,0.2);
      letter-spacing: 1px;
      animation: fadeIn 1.5s ease 0.5s both;
    }

    @keyframes fadeIn {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ========== Responsive ========== */
    @media (max-width: 480px) {
      .login-card {
        margin: 16px;
        padding: 36px 24px 28px;
        border-radius: 16px;
      }

      .login-logo {
        width: 72px;
        height: 72px;
        margin-bottom: 20px;
      }

      .login-title {
        font-size: 26px;
        letter-spacing: 6px;
      }

      .login-subtitle {
        font-size: 12px;
        letter-spacing: 4px;
        margin-bottom: 28px;
      }

      .discord-btn {
        font-size: 15px;
        padding: 14px 20px;
      }

      .seal-glow {
        width: 300px;
        height: 300px;
      }
    }

    @media (max-height: 600px) {
      .login-card {
        padding: 28px 24px 24px;
      }

      .login-logo {
        width: 64px;
        height: 64px;
        margin-bottom: 16px;
      }

      .login-subtitle {
        margin-bottom: 24px;
      }
    }

    /* ========== Scrollbar (webkit) ========== */
    ::-webkit-scrollbar { width: 0; height: 0; }

    /* ========== Selection ========== */
    ::selection {
      background: rgba(255,107,53,0.3);
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="bg-layer bg-image" aria-hidden="true"></div>
  <div class="bg-layer bg-gradient" aria-hidden="true"></div>
  <div class="bg-layer bg-vignette" aria-hidden="true"></div>

  <!-- Floating particles container (populated by JS) -->
  <div class="particles" id="particles" aria-hidden="true"></div>

  <!-- Seal glow behind card -->
  <div class="seal-glow" aria-hidden="true"></div>

  <!-- Login Card -->
  <div class="login-card" role="main">
    <img
      class="login-logo"
      src="/img/login-logo.png"
      alt="忍者手记"
      draggable="false"
    />

    <h1 class="login-title">忍者手记</h1>
    <p class="login-subtitle">卷之卷</p>

    <div class="divider" aria-hidden="true"></div>

    <a class="discord-btn" href="/auth/discord" role="button">
      <!-- Discord Logo SVG (official clyde mark) -->
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.947 2.418-2.157 2.418z"/>
      </svg>
      通过 Discord 登录
    </a>

    <p class="login-hint">需要加入指定 Discord 服务器才能登录</p>

    <div class="error-msg" id="errorMsg">
      <i class="error-icon">⚠</i>
      <span id="errorText"></span>
    </div>
  </div>

  <!-- Footer -->
  <div class="login-footer">
    忍者手记 · 火影忍者文字跑团 · v1.0
  </div>

  <script>
    /* =========================================================
       Particle System — pure CSS-animated DOM particles
       ========================================================= */
    (function initParticles() {
      const container = document.getElementById('particles');
      const PARTICLE_COUNT = 35;
      const types = ['fire', 'chakra', 'ember'];

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const el = document.createElement('div');
        const type = types[Math.floor(Math.random() * types.length)];
        const size = type === 'ember'
          ? (2 + Math.random() * 3)
          : (4 + Math.random() * 8);

        el.className = `particle particle--${type}`;
        el.style.width  = size + 'px';
        el.style.height = size + 'px';
        el.style.left   = (Math.random() * 100) + '%';
        el.style.bottom = -(Math.random() * 20) + '%';
        el.style.setProperty('--drift', (Math.random() * 80 - 40) + 'px');
        el.style.animationDuration = (8 + Math.random() * 14) + 's';
        el.style.animationDelay    = (Math.random() * 10) + 's';

        container.appendChild(el);
      }
    })();

    /* =========================================================
       Error Handling — parse URL params
       ========================================================= */
    (function handleErrors() {
      const params = new URLSearchParams(window.location.search);
      const error  = params.get('error');
      const msgEl  = document.getElementById('errorMsg');
      const textEl = document.getElementById('errorText');

      const errorMessages = {
        not_in_guild: '你还不是指定服务器的成员，请先加入服务器后再试。',
        auth_failed:  '认证失败，请稍后重试。',
        server_error: '服务器出现错误，请稍后重试。',
        access_denied: '访问被拒绝，请确认你的账号权限。',
        csrf_error: '跨站请求伪造验证失败(Cookie丢失)，请检查浏览器设置或重试。',
      };

      if (error && msgEl && textEl) {
        textEl.textContent = errorMessages[error] || '登录过程中出现未知错误，请重试。';
        msgEl.classList.add('visible');

        // Clean up URL without reload
        const cleanUrl = window.location.pathname;
        window.history.replaceState({}, '', cleanUrl);
      }
    })();
  </script>
</body>
</html>
